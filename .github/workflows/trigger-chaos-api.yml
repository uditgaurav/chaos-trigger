name: Harness Chaos Trigger With APIs
on:
  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:
    inputs:
      input_set_identity:
        description: "Input set identifier"
        required: true
        default: "Boutique_App_Resilience_Test_Inputs"
      expected_resilience_score:
        description: "Expected resilience score (0-100)"
        required: true
        default: "50"

jobs:
  harness-chaos:
    runs-on: ubuntu-latest
    env:
      ACCOUNT_ID: ${{ vars.HARNESS_ACCOUNT_ID }}
      ORG_ID: ${{ vars.HARNESS_ORG_ID }}
      PROJECT_ID: ${{ vars.HARNESS_PROJECT_ID }}
      EXPERIMENT_ID: ${{ vars.HARNESS_EXPERIMENT_ID }}
      INPUT_SET_IDENTITY: ${{ inputs.input_set_identity }}
      EXPECTED_RES_SCORE: ${{ inputs.expected_resilience_score }}
      API_KEY: ${{ secrets.HARNESS_API_KEY }}
      BASE_URL: https://app.harness.io
      TIMEOUT: "600"
      DELAY: "2"
    steps:
      - name: Trigger Harness Chaos Experiment and monitor
        run: |
          set -euo pipefail

          MISSING=""
          for v in ACCOUNT_ID ORG_ID PROJECT_ID EXPERIMENT_ID API_KEY; do
            if [ -z "${!v:-}" ]; then MISSING="$MISSING $v"; fi
          done
          if [ -n "$MISSING" ]; then
            echo "âťŚ Missing required env vars/secrets:$MISSING"
            echo "Set HARNESS_ACCOUNT_ID, HARNESS_ORG_ID, HARNESS_PROJECT_ID, HARNESS_EXPERIMENT_ID as repo Variables"
            echo "and HARNESS_API_KEY as a repo Secret."
            exit 1
          fi

          API_KEY=$(printf '%s' "$API_KEY" | tr -d '\r\n[:space:]')
          echo "â„ąď¸Ź  Account: $ACCOUNT_ID  Org: $ORG_ID  Project: $PROJECT_ID  Experiment: $EXPERIMENT_ID"

          AUTH_CHECK_URL="$BASE_URL/gateway/chaos/manager/api/rest/v2/experiments/$EXPERIMENT_ID/variables?accountIdentifier=$ACCOUNT_ID&organizationIdentifier=$ORG_ID&projectIdentifier=$PROJECT_ID&isIdentity=false&routingId=$ACCOUNT_ID"
          AUTH_CHECK_FILE=$(mktemp)
          AUTH_CHECK_CODE=$(curl -sS -o "$AUTH_CHECK_FILE" -w "%{http_code}" \
            "$AUTH_CHECK_URL" \
            -H "x-api-key: $API_KEY" \
            -H "Accept: application/json" || echo "000")
          AUTH_CHECK_BODY=$(cat "$AUTH_CHECK_FILE"); rm -f "$AUTH_CHECK_FILE"
          echo "â„ąď¸Ź  Auth check (GET /variables): HTTP $AUTH_CHECK_CODE"
          if [ "$AUTH_CHECK_CODE" = "401" ] || [ "$AUTH_CHECK_CODE" = "403" ]; then
            echo "âťŚ Auth check failed. The x-api-key is not accepted by the gateway."
            echo "Body (first 500 chars): $(printf '%s' "$AUTH_CHECK_BODY" | head -c 500)"
            echo "Fixes: regenerate a Harness PAT with Chaos > Execute Experiment + View permission scoped to project $PROJECT_ID, paste it into the HARNESS_API_KEY repo Secret with no trailing newline."
            exit 1
          fi

          API="$BASE_URL/gateway/chaos/manager/api/rest/v2/experiments/$EXPERIMENT_ID/run"
          QS="accountIdentifier=$ACCOUNT_ID&organizationIdentifier=$ORG_ID&projectIdentifier=$PROJECT_ID&routingId=$ACCOUNT_ID"

          PAYLOAD=$(jq -n --arg identity "$INPUT_SET_IDENTITY" \
            '{inputsetIdentity: $identity, runtimeInputs: null}')

          RESP_FILE=$(mktemp)
          HTTP_CODE=$(curl -sS -o "$RESP_FILE" -w "%{http_code}" \
            -X POST "$API?$QS&isOnboardingRun=false&isIdentity=false" \
            -H "x-api-key: $API_KEY" \
            -H "Accept: application/json" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD" || echo "000")
          RUN_RESP=$(cat "$RESP_FILE")
          rm -f "$RESP_FILE"

          if [ "$HTTP_CODE" != "200" ] || ! echo "$RUN_RESP" | jq -e . >/dev/null 2>&1; then
            echo "âťŚ Failed to trigger experiment (HTTP $HTTP_CODE)."
            echo "Response body:"
            echo "$RUN_RESP"
            exit 1
          fi

          NOTIFY_ID=$(echo "$RUN_RESP" | jq -r '.notifyId // .notifyID // empty')
          if [ -z "$NOTIFY_ID" ]; then
            echo "âťŚ No notifyId in response. Body:"
            echo "$RUN_RESP"
            exit 1
          fi

          echo "đźš€ experiment ran successfully, notifyID: $NOTIFY_ID đźŽ‰"
          echo "The timeout: $TIMEOUT and delay: $DELAY"
          echo

          ELAPSED=0
          PHASE=""
          SCORE=""
          while [ "$ELAPSED" -lt "$TIMEOUT" ]; do
            POLL_FILE=$(mktemp)
            POLL_CODE=$(curl -sS -o "$POLL_FILE" -w "%{http_code}" \
              "$API?$QS&notifyId=$NOTIFY_ID" \
              -H "x-api-key: $API_KEY" \
              -H "Accept: application/json" || echo "000")
            RUN_GET=$(cat "$POLL_FILE")
            rm -f "$POLL_FILE"

            if [ "$POLL_CODE" != "200" ] || ! echo "$RUN_GET" | jq -e . >/dev/null 2>&1; then
              echo "Waiting for experiment completion... transient poll error (HTTP $POLL_CODE)"
              sleep "$DELAY"
              ELAPSED=$((ELAPSED + DELAY))
              continue
            fi

            PHASE=$(echo "$RUN_GET" | jq -r '.phase // empty')
            SCORE=$(echo "$RUN_GET" | jq -r '.resiliencyScore // empty')

            case "$PHASE" in
              Completed|Completed_With_Error|Completed_With_Probe_Failure|Stopped|Error|Timeout)
                echo "đźš€ Experiment completed, CurrentState: $PHASE đźŽ‰"
                break
                ;;
              "")
                echo "Waiting for experiment completion... CurrentState: Pending"
                ;;
              *)
                echo "Waiting for experiment completion... CurrentState: $PHASE"
                ;;
            esac

            sleep "$DELAY"
            ELAPSED=$((ELAPSED + DELAY))
          done

          case "$PHASE" in
            Completed|Completed_With_Error|Completed_With_Probe_Failure|Stopped|Error|Timeout) ;;
            *)
              echo "âťŚ Timed out after ${TIMEOUT}s waiting for experiment to complete (last state: ${PHASE:-Unknown})"
              exit 1
              ;;
          esac

          echo "The timeout: $TIMEOUT and delay: $DELAY"
          if [ -n "$SCORE" ] && [ "$SCORE" != "null" ]; then
            if [ -n "${EXPECTED_RES_SCORE:-}" ]; then
              if awk -v a="$SCORE" -v b="$EXPECTED_RES_SCORE" 'BEGIN { exit !(a >= b) }'; then
                echo "đźš€ expected Resilience Score: $EXPECTED_RES_SCORE, Actual Resilience Score: $SCORE, Actual resilience score meets the expectations đźŽ‰"
              else
                echo "âťŚ expected Resilience Score: $EXPECTED_RES_SCORE, Actual Resilience Score: $SCORE, Actual resilience score does NOT meet the expectations"
                exit 1
              fi
            else
              echo "đź“Š Resilience score: $SCORE"
            fi
          else
            echo "âš ď¸Ź  No resilience score available (phase: $PHASE)"
          fi

          echo "Resilience score: ${SCORE:-N/A}"
